name: expense_tracker
description: "A production-ready mobile expense tracker app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.0
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.0.0

  # State Management
  provider: ^6.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # Utilities
  equatable: ^2.0.7
  intl: ^0.19.0
  uuid: ^4.5.1
  rxdart: ^0.28.0
  fl_chart: ^1.2.0
  csv: ^6.0.0
  pdf: ^3.11.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
